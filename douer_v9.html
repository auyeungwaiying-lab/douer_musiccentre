<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音樂教室管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f7f6f3;color:#1a1a1a;font-size:15px}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:#fff;border:1px solid #e5e3de;border-radius:14px;padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.login-logo{font-size:30px;margin-bottom:6px}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:#999;margin-bottom:1.5rem}
.hint-box{background:#f5f3ff;border:1px solid #ddd8f8;border-radius:8px;padding:10px 14px;font-size:12px;color:#5a4fcf;margin-top:1.25rem;line-height:1.7}

.form-group{margin-bottom:1rem}
.form-label{font-size:13px;color:#555;display:block;margin-bottom:5px;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select,input[type=text],input[type=password],input[type=number],input[type=date],input[type=time],input[type=month],textarea{
  width:100%;border:1px solid #e0deda;border-radius:8px;padding:9px 11px;
  font-size:14px;background:#fff;color:#1a1a1a;outline:none;transition:border .15s}
select:focus,input:focus,textarea:focus{border-color:#aaa}
textarea{height:68px;resize:vertical}
button{cursor:pointer;border:1px solid #e0deda;border-radius:8px;background:#fff;
  color:#1a1a1a;padding:8px 16px;font-size:14px;transition:background .15s}
button:hover{background:#f5f3f0}
button:active{transform:scale(.98)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;width:100%;padding:11px;font-size:15px;font-weight:500}
.btn-primary:hover{background:#333}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{border-color:#f0bfbb;color:#c0392b;background:#fdf3f2}
.btn-danger:hover{background:#fce3e1}
.btn-success{border-color:#b8ddc8;color:#1e7a45;background:#f0f9f4}
.btn-success:hover{background:#dff0ea}
.error-msg{color:#c0392b;font-size:13px;margin-top:8px}

.app{display:none;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;
  border-bottom:1px solid #e5e3de;background:#fff;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.header-title{font-size:16px;font-weight:600}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.role-admin{background:#ede9fe;color:#5b21b6}
.role-teacher{background:#f0fdf4;color:#15803d}
.user-name{font-size:13px;color:#999}

.nav{display:flex;gap:4px;padding:.65rem 1.25rem;border-bottom:1px solid #e5e3de;
  background:#faf9f7;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{white-space:nowrap;font-size:13px;padding:6px 14px;border-radius:8px;
  border:none;background:transparent;color:#777}
.nav-btn.active{background:#fff;color:#1a1a1a;border:1px solid #e0deda;font-weight:500}

.content{padding:1.25rem;max-width:1000px;margin:0 auto}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-title{font-size:16px;font-weight:600}
.sub-title{font-size:13px;font-weight:600;color:#555;margin-bottom:6px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:1rem}
.stat-label{font-size:12px;color:#999;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:600}
.stat-sub{font-size:12px;color:#bbb;margin-top:2px}

.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.month-nav button{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:50%}
.month-label{font-size:15px;font-weight:500;min-width:90px;text-align:center}

.table-wrap{background:#fff;border:1px solid #e5e3de;border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-weight:500;font-size:12px;color:#999;
  border-bottom:1px solid #e5e3de;background:#faf9f7}
td{padding:10px 14px;border-bottom:1px solid #f0efec;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f7}
.summary-row td{background:#fafaf7;font-weight:500;color:#555;font-size:12px;border-top:1px solid #e5e3de}

.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-green{background:#f0fdf4;color:#15803d}
.badge-amber{background:#fefce8;color:#854d0e}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1.5rem;
  width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.alert-error{background:#fdf3f2;color:#c0392b;border:1px solid #fecaca}
.alert-warn{background:#fefce8;color:#854d0e;border:1px solid #fde68a}
.alert-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;
  border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:2.5rem;color:#bbb;font-size:14px}
.loading-state{text-align:center;padding:2rem;color:#bbb;font-size:13px}

.setup-banner{background:#fefce8;border:1px solid #fde68a;border-radius:10px;
  padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px;color:#713f12;line-height:1.7}
.setup-banner strong{display:block;margin-bottom:4px;font-size:14px}

.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:1.25rem}
.student-card{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:.9rem 1rem}
.student-name{font-size:14px;font-weight:600;margin-bottom:6px}
.student-stats{display:flex;gap:16px}
.student-stat-val{font-size:18px;font-weight:600}
.student-stat-lbl{font-size:11px;color:#999}

/* income category tabs */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.cat-tab{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #e0deda;background:#fff;color:#555;cursor:pointer}
.cat-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* clock-in grid */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:1.25rem}
.staff-card{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:.9rem 1rem}
.staff-name{font-size:14px;font-weight:600;margin-bottom:4px}
.staff-hours{font-size:22px;font-weight:600}
.staff-sub{font-size:12px;color:#999}

.divider{height:1px;background:#f0efec;margin:1.25rem 0}
.date-chip{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;background:#f0f0ee;color:#555;}
</style>
</head>
<body>

<!-- 登入 -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🎵</div>
    <div class="login-title">音樂教室管理系統</div>
    <div class="login-sub">請選擇身分並登入</div>
    <div class="form-group">
      <label class="form-label">身分</label>
      <select id="loginRole" onchange="onRoleChange()">
        <option value="">— 請選擇 —</option>
        <option value="admin">管理員</option>
        <option value="teacher">老師</option>
      </select>
    </div>
    <div id="teacherSelectWrap" style="display:none" class="form-group">
      <label class="form-label">老師姓名</label>
      <select id="loginTeacher"><option value="">— 請選擇 —</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">密碼</label>
      <input type="password" id="loginPassword" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">登入</button>
    <div class="error-msg" id="loginError"></div>
    <div class="hint-box">
      預設密碼：管理員 <strong>admin123</strong>　老師 <strong>teacher123</strong>
    </div>
  </div>
</div>

<!-- 主畫面 -->
<div class="app" id="mainApp">
  <div class="header">
    <div class="header-left">
      <span style="font-size:18px">🎵</span>
      <div class="header-title">音樂教室</div>
      <span class="role-badge" id="roleBadge"></span>
      <span class="user-name" id="userNameDisplay"></span>
    </div>
    <button class="btn-sm" onclick="doLogout()">登出</button>
  </div>
  <div class="nav" id="mainNav"></div>
  <div class="content" id="mainContent">
    <div class="loading-state"><span class="spinner"></span>載入中...</div>
  </div>
</div>
<div id="modalContainer"></div>

<script>
// ============================================================
// ⚙️  換成你的 Apps Script 部署網址
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxrS__MqXejbIDM39hJuFZIsR7McWoSqLxRXwLdFClXn39o_4i_Ijg4-OvlPOj6w6y5Ig/exec';

// 負責團體課的老師（可在此修改）
const GROUP_TEACHERS = ['廷廷', 'Yukie', '馬希', '俐俐'];

// ============================================================
// 密碼
// ============================================================
function getPW(r){ return localStorage.getItem('pw_'+r)||(r==='admin'?'admin123':'teacher123'); }
function setPW(r,pw){ localStorage.setItem('pw_'+r,pw); }

// ============================================================
// Demo DB
// ============================================================
const _initDB = ()=>({
  teachers:[], staff:[], income_categories:[],
  private_lessons:[], group_lessons:[], clockin:[], income:[]
});
function _ddb(){ return JSON.parse(localStorage.getItem('music_v3_db')||JSON.stringify(_initDB())); }
function _sdb(db){ localStorage.setItem('music_v3_db',JSON.stringify(db)); }

async function api(action, sheet, extra={}) {
  if(!SCRIPT_URL||SCRIPT_URL.length<20) return demoAPI(action,sheet,extra);
  const res = await fetch(SCRIPT_URL,{
    method:'POST', body:JSON.stringify({action,sheet,...extra}),
    headers:{'Content-Type':'text/plain'}
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error||'API Error');
  return json.data;
}

function demoAPI(action,sheet,extra){
  const db=_ddb();
  if(!db[sheet]) db[sheet]=[];
  if(action==='getAll') return db[sheet];
  if(action==='append'){ db[sheet].push(extra.data); _sdb(db); return null; }
  if(action==='delete'){ db[sheet]=db[sheet].filter(r=>String(r.id)!==String(extra.id)); _sdb(db); return null; }
  if(action==='update'){ const r=db[sheet].find(r=>String(r.id)===String(extra.id)); if(r) Object.assign(r,extra.updates); _sdb(db); return null; }
}

// ============================================================
// State
// ============================================================
let CU=null;
let currentTab=null;
let viewMonth=new Date().toISOString().slice(0,7);
let DB={ teachers:[], staff:[], income_categories:[], students:[], private_lessons:[], group_lessons:[], clockin:[], income:[] };
let activeCat='全部';

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

async function loadAll(){
  const keys=Object.keys(DB);
  await Promise.all(keys.map(async k=>{ DB[k]=(await api('getAll',k))||[]; }));
}

// ============================================================
// 計算打卡時數（分鐘）
// ============================================================
function calcMinutes(clockIn, clockOut){
  if(!clockIn||!clockOut) return 0;
  const [ih,im]=clockIn.split(':').map(Number);
  const [oh,om]=clockOut.split(':').map(Number);
  const diff=(oh*60+om)-(ih*60+im);
  return diff>0?diff:0;
}
function fmtHours(min){ return (min/60).toFixed(1); }

// ============================================================
// 登入
// ============================================================
function onRoleChange(){
  const role=document.getElementById('loginRole').value;
  const wrap=document.getElementById('teacherSelectWrap');
  if(role==='teacher'){
    wrap.style.display='';
    document.getElementById('loginTeacher').innerHTML='<option value="">— 請選擇 —</option>'+
      DB.teachers.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');
  } else { wrap.style.display='none'; }
}

async function doLogin(){
  const role=document.getElementById('loginRole').value;
  const pw=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  if(!role){ err.textContent='請選擇身分'; return; }
  if(role==='teacher'&&!document.getElementById('loginTeacher').value){ err.textContent='請選擇老師姓名'; return; }
  if(pw!==getPW(role)){ err.textContent='密碼錯誤'; return; }
  err.textContent=''; btn.textContent='登入中...';
  try{ await loadAll(); }
  catch(e){ err.textContent='無法連線，請確認網址設定'; btn.textContent='登入'; return; }
  CU={ role, name: role==='admin'?'管理員':document.getElementById('loginTeacher').value };
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  const badge=document.getElementById('roleBadge');
  badge.className='role-badge '+(role==='admin'?'role-admin':'role-teacher');
  badge.textContent=role==='admin'?'管理員':'老師';
  document.getElementById('userNameDisplay').textContent=CU.name;
  buildNav();
  showTab(role==='admin'?'dashboard':'my_private');
  btn.textContent='登入';
}

function doLogout(){
  CU=null;
  document.getElementById('loginScreen').style.display='';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginPassword').value='';
  document.getElementById('loginRole').value='';
  document.getElementById('teacherSelectWrap').style.display='none';
}

// ============================================================
// Nav
// ============================================================
function buildNav(){
  let tabs;
  if(CU.role==='admin'){
    tabs=[['dashboard','📊 總覽'],['private_admin','個別課'],['group_admin','團體課'],
          ['clockin_admin','上班時數'],['income_admin','每月收入'],['settings','設定']];
  } else {
    tabs=[['my_private','我的個別課']];
    if(GROUP_TEACHERS.includes(CU.name)) tabs.push(['my_group','我的團體課']);
  }
  document.getElementById('mainNav').innerHTML=tabs.map(([id,lbl])=>
    `<button class="nav-btn" data-tab="${id}" onclick="showTab('${id}')">${lbl}</button>`).join('');
}

async function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  setContent('<div class="loading-state"><span class="spinner"></span>載入中...</div>');
  try{
    await loadAll();
    const fns={dashboard:renderDashboard,private_admin:renderPrivateAdmin,group_admin:renderGroupAdmin,
      clockin_admin:renderClockinAdmin,income_admin:renderIncomeAdmin,settings:renderSettings,
      my_private:renderMyPrivate,my_group:renderMyGroup};
    (fns[tab]||renderDashboard)();
  } catch(e){ setContent(`<div class="alert alert-error">載入失敗：${e.message}</div>`); }
}

function setContent(html){ document.getElementById('mainContent').innerHTML=html; }

// ============================================================
// 月份導覽
// ============================================================
function monthNavHTML(){
  return `<div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label">${viewMonth}</div>
    <button onclick="changeMonth(1)">›</button>
  </div>`;
}
function changeMonth(d){
  const [y,m]=viewMonth.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  viewMonth=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  showTab(currentTab);
}

// ============================================================
// Dashboard
// ============================================================
function renderDashboard(){
  const isDemo=!SCRIPT_URL||SCRIPT_URL.length<20;
  const tm=new Date().toISOString().slice(0,7);
  const mp=DB.private_lessons.filter(r=>r.date&&r.date.startsWith(tm));
  const mg=DB.group_lessons.filter(r=>r.date&&r.date.startsWith(tm));
  const mr=mp.reduce((s,r)=>s+(parseFloat(r.price)||0),0);
  const mi=DB.income.filter(r=>r.month&&r.month.startsWith(tm)).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const clockMin=DB.clockin.filter(r=>r.date&&r.date.startsWith(tm)).reduce((s,r)=>s+calcMinutes(r.clock_in,r.clock_out),0);

  setContent(`
    ${isDemo?`<div class="setup-banner"><strong>⚠️ 示範模式（尚未連接 Google Sheets）</strong>在 HTML 頂部設定 <code>SCRIPT_URL</code> 後重新整理即可啟用雲端同步。</div>`:''}
    <div style="margin-bottom:.5rem;font-size:13px;color:#999">本月 ${tm}</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">個別課堂數</div><div class="stat-value">${mp.length}</div><div class="stat-sub">堂</div></div>
      <div class="stat-card"><div class="stat-label">團體課堂數</div><div class="stat-value">${mg.length}</div><div class="stat-sub">堂</div></div>
      <div class="stat-card"><div class="stat-label">個別課收入</div><div class="stat-value">$${Math.round(mr).toLocaleString()}</div><div class="stat-sub">元</div></div>
      <div class="stat-card"><div class="stat-label">其他收入</div><div class="stat-value">$${Math.round(mi).toLocaleString()}</div><div class="stat-sub">元</div></div>
      <div class="stat-card"><div class="stat-label">行政總工時</div><div class="stat-value">${fmtHours(clockMin)}</div><div class="stat-sub">小時（本月）</div></div>
    </div>
    <div class="sub-title" style="margin-bottom:.75rem">本月個別課（各老師）</div>
    <div class="table-wrap">${teacherSummaryTable(tm)}</div>`);
}

function teacherSummaryTable(month){
  if(!DB.teachers.length) return '<div class="empty-state">尚無老師資料</div>';
  const rows=DB.teachers.map(t=>{
    const ls=DB.private_lessons.filter(r=>r.teacher===t.name&&r.date&&r.date.startsWith(month));
    const tot=ls.reduce((s,r)=>s+(parseFloat(r.price)||0),0);
    return `<tr><td>${t.name}</td><td>${ls.length} 堂</td><td>$${Math.round(tot).toLocaleString()}</td></tr>`;
  }).join('');
  return `<table><thead><tr><th>老師</th><th>堂數</th><th>收入</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ============================================================
// 管理員：個別課
// ============================================================
function renderPrivateAdmin(){
  const lessons=DB.private_lessons.filter(r=>r.date&&r.date.startsWith(viewMonth));
  const byTeacher={};
  lessons.forEach(r=>{ if(!byTeacher[r.teacher]) byTeacher[r.teacher]=[]; byTeacher[r.teacher].push(r); });

  const blocks=Object.entries(byTeacher).map(([teacher,recs])=>{
    const byStudent={};
    recs.forEach(r=>{ if(!byStudent[r.student]) byStudent[r.student]=[]; byStudent[r.student].push(r); });
    const total=recs.reduce((s,r)=>s+(parseFloat(r.price)||0),0);
    const detailRows=recs.sort((a,b)=>a.date>b.date?1:-1).map(r=>`<tr>
      <td>${r.date}</td><td>${r.student}</td><td>$${parseFloat(r.price)||0}</td>
      <td><button class="btn-sm btn-danger" onclick="deleteRecord('private_lessons','${r.id}')">刪除</button></td>
    </tr>`).join('');
    const summaryRows=Object.entries(byStudent).map(([s,rs])=>{
      const cnt=rs.length,tot=rs.reduce((sum,r)=>sum+(parseFloat(r.price)||0),0);
      return `<tr class="summary-row"><td></td><td>↳ ${s}</td><td>${cnt} 堂 = $${Math.round(tot).toLocaleString()}</td><td></td></tr>`;
    }).join('');
    return `<div style="margin-bottom:1.25rem">
      <div class="sub-title" style="margin-bottom:6px">${teacher} 老師　<span style="font-weight:400;color:#999">${recs.length} 堂 / $${Math.round(total).toLocaleString()}</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>日期</th><th>學生</th><th>單堂</th><th>操作</th></tr></thead>
        <tbody>${detailRows}${summaryRows}</tbody>
      </table></div></div>`;
  }).join('');

  setContent(`
    ${monthNavHTML()}
    <div class="section-header">
      <div class="section-title">個別課記錄</div>
      <button onclick="openPrivateModal()">+ 新增課堂</button>
    </div>
    ${blocks||'<div class="table-wrap"><div class="empty-state">本月尚無記錄</div></div>'}`);
}

// ============================================================
// 管理員：團體課
// ============================================================
// 計算團體課費用
function calcGroupFee(teacher, headcount) {
  const n = parseInt(headcount) || 0;
  if (teacher === '廷廷') return n * 220;
  if (teacher === 'yukie') return n * 250;
  if (teacher === '俐俐') {
    if (n <= 0) return 0;
    if (n <= 4) return 700;
    return 700 + (n - 4) * 80;
  }
  if (teacher === '馬希') return n > 0 ? 600 : 0;
  return n * 220; // 預設
}
function feeDesc(teacher, headcount) {
  const n = parseInt(headcount) || 0;
  if (teacher === '廷廷') return `${n} 人 × $220`;
  if (teacher === 'yukie') return `${n} 人 × $250`;
  if (teacher === '俐俐') {
    if (n <= 4) return `${n} 人（4人以下 $700）`;
    return `${n} 人（$700 + ${n-4} × $80）`;
  }
  if (teacher === '馬希') return `每堂 $600`;
  return `${n} 人`;
}

function renderGroupAdmin(){
  const rows=DB.group_lessons.filter(r=>r.date&&r.date.startsWith(viewMonth)).sort((a,b)=>a.date>b.date?1:-1);

  const totalRev=rows.reduce((s,r)=>s+calcGroupFee(r.teacher,r.headcount),0);
  // 按老師分組統計
  const byTeacher={};
  rows.forEach(r=>{
    const t=r.teacher||'未知';
    if(!byTeacher[t]) byTeacher[t]={count:0,head:0,rev:0};
    byTeacher[t].count++;
    byTeacher[t].head+=(parseInt(r.headcount)||0);
    byTeacher[t].rev+=calcGroupFee(r.teacher,r.headcount);
  });
  const teacherCards=Object.entries(byTeacher).map(([t,v])=>`

function groupTableHTML(rows,showDel){
  if(!rows.length) return '<div class="empty-state">本月尚無記錄</div>';
  const totalHead=rows.reduce((s,r)=>s+(parseInt(r.headcount)||0),0);
  const totalRev=rows.reduce((s,r)=>s+calcGroupFee(r.teacher,r.headcount),0);
  return `<table><thead><tr><th>日期</th><th>時間</th><th>課程名稱</th><th>老師</th><th>人數</th><th>收費</th><th>小計</th>${showDel?'<th>操作</th>':''}</tr></thead><tbody>
    ${rows.map(r=>`<tr>

      <td>${r.teacher||''}</td><td>${r.headcount||0}人</td>

}

  const today=new Date().toISOString().slice(0,10);
  const sOpts=DB.staff.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
  if(!sOpts){ alert('請先在設定頁面新增行政人員'); return; }
  showModal('新增打卡記錄',`
    <div class="form-row">
      <div class="form-group"><label class="form-label">日期 *</label><input type="date" id="f_date" value="${today}"></div>
      <div class="form-group"><label class="form-label">行政人員 *</label><select id="f_staff">${sOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">上班時間 *</label><input type="time" id="f_in" value="09:00"></div>
      <div class="form-group"><label class="form-label">下班時間</label><input type="time" id="f_out" value="18:00"></div>
    </div>
    <div class="form-group"><label class="form-label">備註</label><input type="text" id="f_note" placeholder="選填"></div>`,
    "submitClockin()");
}

function openIncomeModal(){
  const today=new Date().toISOString().slice(0,10);
  const catOpts=DB.income_categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  if(!catOpts){ alert('請先在設定頁面新增收入分類'); return; }
  showModal('新增收入記錄',`
    <div class="form-row">
      <div class="form-group"><label class="form-label">日期 *</label><input type="date" id="f_date" value="${today}"></div>
      <div class="form-group"><label class="form-label">分類 *</label><select id="f_cat">${catOpts}</select></div>
    </div>
    <div class="form-group"><label class="form-label">說明</label><input type="text" id="f_desc" placeholder="例：王小明 4月學費"></div>
    <div class="form-group"><label class="form-label">金額（元） *</label><input type="number" id="f_amount" value="0" min="0" step="100"></div>
    <div class="form-group"><label class="form-label">備註</label><input type="text" id="f_note" placeholder="選填"></div>`,
    "submitIncome()");
}

// Submit handlers
async function submitPrivate(){
  if(!g('f_date')||!g('f_teacher')||!g('f_student')){ showModalAlert('請填寫必要欄位（*）'); return; }
  const price=document.getElementById('f_price').value||'0';
  await submitRecord('private_lessons',{id:uid(),date:g('f_date'),teacher:g('f_teacher'),student:g('f_student'),price});
}
async function submitGroup(){
  if(!g('f_date')||!g('f_time')||!g('f_className')){ showModalAlert('請填寫必要欄位（*）'); return; }
  await submitRecord('group_lessons',{id:uid(),date:g('f_date'),time:g('f_time'),className:g('f_className'),teacher:g('f_teacher'),headcount:g('f_headcount')||'1'});
}
async function submitClockin(){
  if(!g('f_date')||!g('f_staff')||!g('f_in')){ showModalAlert('請填寫必要欄位（*）'); return; }
  await submitRecord('clockin',{id:uid(),date:g('f_date'),staff:g('f_staff'),clock_in:g('f_in'),clock_out:g('f_out')||'',note:g('f_note')});
}
async function submitIncome(){
  if(!g('f_date')||!g('f_cat')||!g('f_amount')){ showModalAlert('請填寫必要欄位（*）'); return; }
  const month=g('f_date').slice(0,7);
  await submitRecord('income',{id:uid(),date:g('f_date'),month,category:g('f_cat'),description:g('f_desc')||'',amount:g('f_amount'),note:g('f_note')});
}

async function submitRecord(sheet,rec){
  const btn=document.getElementById('submitBtn');
  btn.innerHTML='<span class="spinner"></span>儲存中...'; btn.disabled=true;
  try{ await api('append',sheet,{data:rec}); closeModal(); showTab(currentTab); }
  catch(e){ showModalAlert('儲存失敗：'+e.message); btn.innerHTML='儲存'; btn.disabled=false; }
}

async function deleteRecord(sheet,id){
  if(!confirm('確定要刪除這筆資料？')) return;
  try{ await api('delete',sheet,{id}); showTab(currentTab); }
  catch(e){ alert('刪除失敗：'+e.message); }
}

// Settings helpers
async function addItem(sheet,inputId){
  const name=document.getElementById(inputId).value.trim();
  if(!name) return;
  if(DB[sheet].find(r=>r.name===name)){ alert('已存在'); return; }
  try{ await api('append',sheet,{data:{id:uid(),name}}); showTab('settings'); }
  catch(e){ alert('新增失敗：'+e.message); }
}
async function removeItem(sheet,id){
  if(!confirm('確定要移除？')) return;
  const rec=DB[sheet].find(r=>String(r.id)===String(id)||r.name===id);
  if(!rec) return;
  try{ await api('delete',sheet,{id:rec.id||id}); showTab('settings'); }
  catch(e){ alert('移除失敗：'+e.message); }
}
function toggleCard(id){
  const el=document.getElementById(id);
  const arrow=document.getElementById(id+'_arrow');
  if(!el) return;
  if(el.style.display==='none'){ el.style.display='block'; if(arrow) arrow.textContent='▲'; }
  else { el.style.display='none'; if(arrow) arrow.textContent='▼'; }
}

function changePW(role){
  const val=document.getElementById(role==='admin'?'newAdminPW':'newTeacherPW').value.trim();
  if(!val||val.length<4){ alert('密碼至少4個字元'); return; }
  setPW(role,val); document.getElementById(role==='admin'?'newAdminPW':'newTeacherPW').value=''; alert('密碼已更新！');
}

async function addStudent(){
  const name=document.getElementById('newStudentName').value.trim();
  const price=document.getElementById('newStudentPrice').value;
  if(!name){ alert('請輸入學生姓名'); return; }
  if(DB.students.find(s=>s.name===name)){ alert('學生已存在'); return; }
  try{ await api('append','students',{data:{id:uid(),name,price}}); showTab('settings'); }
  catch(e){ alert('新增失敗：'+e.message); }
}

async function removeStudent(id){
  if(!confirm('確定要移除這位學生？')) return;
  try{ await api('delete','students',{id}); showTab('settings'); }
  catch(e){ alert('移除失敗：'+e.message); }
}

      DB.teachers.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');

})();
</script>
